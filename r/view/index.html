<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>診断結果β | お客様どっと混む</title>
  <style>
    :root {
      --ink: #1c2430;
      --muted: #667085;
      --line: #d8dee7;
      --soft: #f6f8fb;
      --paper: #ffffff;
      --green: #1f8a70;
      --green-soft: #e7f5ef;
      --blue-soft: #eaf1ff;
      --rose: #c9415d;
      --rose-soft: #fdecef;
      --amber: #c77a12;
      --amber-soft: #fff3dd;
      --shadow: 0 18px 50px rgba(28, 36, 48, .12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #edf1f6;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "YuGothic", "Noto Sans JP", sans-serif;
      line-height: 1.6;
    }

    .shell {
      min-height: 100vh;
      padding: 28px;
    }

    .report {
      width: min(1180px, 100%);
      margin: 0 auto;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: center;
      padding: 22px 28px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfe;
    }

    .brand strong {
      display: block;
      font-size: 22px;
    }

    .brand span,
    .meta {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 28px;
      padding: 30px 28px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.18;
      letter-spacing: 0;
    }

    .summary {
      max-width: 760px;
      color: #344054;
      margin: 0;
    }

    .score-ring {
      --value: 0;
      width: 150px;
      aspect-ratio: 1;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at center, #fff 0 58%, transparent 59%),
        conic-gradient(var(--green) calc(var(--value) * 1%), #e5e9f0 0);
      border: 1px solid #e5e9f0;
    }

    .score-ring strong {
      display: block;
      font-size: 42px;
      line-height: 1;
      text-align: center;
    }

    .score-ring span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      font-weight: 800;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      padding: 20px 28px;
      background: var(--soft);
      border-bottom: 1px solid var(--line);
    }

    .metric,
    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 16px;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .metric strong {
      display: block;
      margin-top: 4px;
      font-size: 20px;
    }

    .metric p {
      margin: 8px 0 0;
      color: #344054;
      font-size: 12px;
      line-height: 1.55;
    }

    .score-explain-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .score-explain {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 14px;
    }

    .score-explain span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .score-explain strong {
      display: block;
      margin: 4px 0 8px;
      font-size: 24px;
      line-height: 1.2;
    }

    .score-explain p {
      margin: 0;
      color: #344054;
      font-size: 13px;
    }

    .criteria {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      padding: 24px 28px;
      background: var(--soft);
    }

    .panel.full {
      grid-column: 1 / -1;
    }

    .panel h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .list li {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 12px;
      color: #344054;
      font-size: 14px;
    }

    .action {
      border-color: #f0c2ca;
      background: var(--rose-soft);
    }

    .action strong {
      color: var(--rose);
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .video {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 14px;
    }

    .tag {
      display: inline-flex;
      margin-bottom: 8px;
      border-radius: 999px;
      padding: 3px 8px;
      color: var(--green);
      background: var(--green-soft);
      border: 1px solid #b7dfd1;
      font-size: 11px;
      font-weight: 800;
    }

    .referral-cta {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      border: 1px solid #b7dfd1;
      border-radius: 8px;
      background: var(--green-soft);
      padding: 18px;
    }

    .referral-cta strong {
      display: block;
      font-size: 20px;
      line-height: 1.35;
    }

    .referral-cta span {
      display: block;
      color: #345d50;
      margin-top: 4px;
      font-size: 13px;
      font-weight: 700;
    }

    .referral-cta a {
      display: inline-flex;
      min-height: 42px;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      padding: 10px 14px;
      color: #fff;
      background: var(--green);
      border: 1px solid var(--green);
      font-size: 13px;
      font-weight: 850;
      text-decoration: none;
      white-space: nowrap;
    }

    .loading,
    .error {
      width: min(760px, 100%);
      margin: 80px auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 28px;
    }

    .share {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding: 22px 28px;
      border-top: 1px solid var(--line);
      background: #fbfcfe;
    }

    .share a,
    .share button {
      display: inline-flex;
      min-height: 42px;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      padding: 10px 14px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      font-size: 13px;
      font-weight: 850;
      text-decoration: none;
      cursor: pointer;
      font-family: inherit;
    }

    .share a.primary {
      color: #fff;
      background: var(--green);
      border-color: var(--green);
    }

    .share button.primary-lite {
      color: var(--green);
      border-color: #b7dfd1;
      background: var(--green-soft);
    }

    @media (max-width: 860px) {
      .shell { padding: 12px; }
      .topbar,
      .hero,
      .metrics,
      .grid {
        padding-left: 16px;
        padding-right: 16px;
      }

      .hero,
      .grid,
      .metrics,
      .video-grid,
      .score-explain-grid,
      .referral-cta {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="loading" id="loading">診断結果を読み込んでいます...</div>
    <div class="error" id="error" hidden></div>
    <article class="report" id="report" hidden>
      <header class="topbar">
        <div class="brand">
          <strong>お客様どっと混む</strong>
          <span>えらばれる店スコア診断 β</span>
        </div>
        <div class="meta" id="meta"></div>
      </header>

      <section class="hero">
        <div>
          <h1 id="store-name"></h1>
          <p class="summary" id="summary"></p>
        </div>
        <div class="score-ring" id="score-ring">
          <div><strong id="total-score">--</strong><span>/ 100</span></div>
        </div>
      </section>

      <section class="metrics" id="metrics"></section>

      <section class="grid">
        <div class="panel full">
          <h2>スコアの見方</h2>
          <div class="score-explain-grid" id="score-explanations"></div>
        </div>
        <div class="panel">
          <h2>Google Maps観測値</h2>
          <ul class="list" id="maps-list"></ul>
        </div>
        <div class="panel">
          <h2>弱点トップ3</h2>
          <ul class="list" id="weaknesses"></ul>
        </div>
        <div class="panel">
          <h2>強みトップ3</h2>
          <ul class="list" id="strengths"></ul>
        </div>
        <div class="panel action">
          <h2>今すぐ直すべき1点</h2>
          <p><strong id="top-fix"></strong></p>
        </div>
        <div class="panel full">
          <h2>今撮るべき動画3本</h2>
          <div class="video-grid" id="videos"></div>
        </div>
        <div class="referral-cta">
          <div>
            <strong>あなたのお友達のお店も診断してみませんか？</strong>
            <span>Google Maps、口コミ、SNS、来店前不安を無料でβ診断できます。</span>
          </div>
          <a href="/">完全無料で試す</a>
        </div>
        <div class="panel full">
          <h2>月次レポートβ</h2>
          <ul class="list" id="monthly"></ul>
        </div>
      </section>

      <section class="share">
        <button class="primary-lite" id="native-share" type="button">共有する</button>
        <a id="line-share" href="#">LINEで送る</a>
        <a id="mail-share" href="#">メールで送る</a>
        <button id="copy-share" type="button">リンクをコピー</button>
        <a class="primary" href="/">あなたのお友達のお店も診断してみませんか？ 完全無料</a>
      </section>
    </article>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id") || params.get("request_id");
    const loading = document.querySelector("#loading");
    const errorBox = document.querySelector("#error");
    const reportEl = document.querySelector("#report");

    function text(value, fallback = "未判定") {
      return value === null || value === undefined || value === "" ? fallback : String(value);
    }

    function escapeHtml(value) {
      return text(value, "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function parseJson(value, fallback) {
      if (!value) return fallback;
      if (typeof value !== "string") return value;
      try {
        return JSON.parse(value);
      } catch {
        return fallback;
      }
    }

    function list(target, items) {
      const el = document.querySelector(target);
      el.innerHTML = "";
      (items || []).filter(Boolean).slice(0, 8).forEach((item) => {
        const li = document.createElement("li");
        li.textContent = typeof item === "string" ? item : [item.title, item.body || item.reason].filter(Boolean).join(" - ");
        el.appendChild(li);
      });
    }

    function metric(label, value, note) {
      return `
        <div class="metric">
          <span>${escapeHtml(label)}</span>
          <strong>${escapeHtml(text(value))}</strong>
          <p>${escapeHtml(note)}</p>
        </div>
      `;
    }

    function scoreCard(label, score, body, criteria) {
      return `
        <div class="score-explain">
          <span>${escapeHtml(label)}</span>
          <strong>${escapeHtml(text(score))}</strong>
          <p>${escapeHtml(body)}</p>
          <small class="criteria">${escapeHtml(criteria)}</small>
        </div>
      `;
    }

    function scoreLevel(score) {
      const number = Number(score);
      if (!Number.isFinite(number)) return "未判定";
      if (number >= 80) return "強い";
      if (number >= 60) return "土台あり";
      if (number >= 40) return "改善余地あり";
      return "要改善";
    }

    function mapsScoreComment(maps, ai) {
      const score = ai.maps_score || maps.maps_score;
      const status = scoreLevel(score);
      const rating = text(maps.rating);
      const reviews = text(maps.user_rating_count, "0");
      if (status === "強い") {
        return `Google Maps上で店舗特定、評価、口コミの土台は強い状態です。評価${rating}、口コミ${reviews}件が信頼の入口になっています。`;
      }
      if (status === "土台あり") {
        return `Google Maps上で見つけられる土台はあります。次は写真、営業時間、入口、駐車場など来店前情報の見せ方を整える段階です。`;
      }
      return `Google Maps上で選ばれるための基本情報に改善余地があります。店舗特定、写真、営業時間、電話、Web導線を優先確認します。`;
    }

    function reviewScoreComment(maps, ai) {
      const reviews = Number(maps.user_rating_count || 0);
      const rating = Number(maps.rating || 0);
      if (reviews >= 100 && rating >= 4) {
        return `口コミ数と評価平均は信頼形成にかなり効いています。ただし、口コミを「行く理由」へ変える写真・投稿・返信導線が次の改善点です。`;
      }
      if (reviews >= 20) {
        return `一定の口コミ蓄積があります。初来店客に安心感を出すには、良い口コミの傾向をGoogle MapsやSNSで見える形に翻訳すると強くなります。`;
      }
      return `口コミ量がまだ少なめです。来店後に自然に口コミを書いてもらえる声かけと、写真つき投稿の導線づくりが重要です。`;
    }

    function seoScoreComment(request, ai) {
      if (request.website_url) {
        return `公式サイトURLは確認できています。地域名＋業種、ランチ、カフェ、駐車場、営業時間など検索意図に答えるページ・文言の強化余地を見ます。`;
      }
      return `公式サイトURLが未入力、または確認できていません。SEO診断は限定的ですが、Google Maps、SNS、外部ページで最低限の検索導線を補えます。`;
    }

    function geoScoreComment(ai) {
      const score = ai.geo_score;
      if (Number(score) >= 70) {
        return `AI検索が推薦理由に使える特徴が比較的見えています。さらに「誰に、なぜおすすめか」を明文化すると強くなります。`;
      }
      if (Number(score) >= 50) {
        return `AI検索に拾われる情報はありますが、推薦文にしやすい特徴、利用シーン、来店前不安への回答がまだ弱い可能性があります。`;
      }
      return `AI検索がこの店を説明・推薦するための材料が不足気味です。公式サイト、Maps、SNSに特徴文とPlan情報を増やす必要があります。`;
    }

    function concise(value, max = 52) {
      const raw = text(value, "");
      return raw.length > max ? `${raw.slice(0, max)}...` : raw;
    }

    function mapsMetricNote(maps, ai) {
      const full = mapsScoreComment(maps, ai);
      return concise(full, 48);
    }

    function reviewMetricNote(maps, ai) {
      const full = reviewScoreComment(maps, ai);
      return concise(full, 48);
    }

    function searchMetricNote(request, ai) {
      const seo = Number(ai.seo_score);
      const geo = Number(ai.geo_score);
      if (Number.isFinite(seo) && Number.isFinite(geo)) {
        if (seo >= 60 && geo < 60) return "Webの土台はあります。AI検索で推薦される理由の明文化が次の課題です。";
        if (seo < 60 && geo < 60) return "検索とAI検索の両方で、地域名・特徴・来店前情報の補強が必要です。";
        return "検索導線は一定あります。地域名＋利用シーンへの対応をさらに強化できます。";
      }
      return request.website_url ? "公式サイトは確認済み。地域検索語への対応を追加確認します。" : "公式サイト未確認のため、SEO評価は限定的です。";
    }

    function focusMetricNote(value) {
      const raw = text(value, "今月の重点改善を確認します。");
      return concise(raw, 48);
    }

    function buildMailSubject(storeName) {
      return `【無料診断結果】${storeName}様のお店の見え方診断`;
    }

    function buildMailBody(storeName, totalScore, maps, ai, monthly) {
      const focus = text(monthly.this_month_focus || ai.top_fix, "Google MapsとSNSの来店前情報を整える");
      const mapsScore = text(ai.maps_score || maps.maps_score);
      const reviewText = `${text(maps.rating)} / ${text(maps.user_rating_count, "0")}件`;
      const seoScore = text(ai.seo_score);
      const geoScore = text(ai.geo_score);
      const reportUrl = window.location.href;
      const topFix = text(ai.top_fix || monthly.this_month_focus, "Google MapsとSNSの来店前情報を整える");

      return `${storeName}様

お客様どっと混むの無料β診断結果ができました。

今回の診断では、Google Maps、口コミ、簡易SEO、AI検索、SNS、来店前不安の観点から、
「お店がネット上でどう見えているか」を確認しています。

▼診断結果はこちら
${reportUrl}

主な結果
・総合スコア：${text(totalScore || "")} / 100
・Google Mapsスコア：${mapsScore}
・口コミ：${reviewText}
・検索スコア：SEO ${seoScore} / AI検索 ${geoScore}
・今月の重点：${shortFocus(focus)}

短評
・Google Maps：${mapsMetricNote(maps, ai)}
・口コミ：${reviewMetricNote(maps, ai)}
・検索/AI検索：${searchMetricNote({}, ai)}

今すぐ直すべき1点
${topFix}

よろしければ、従業員様・ご家族・知人のお店の方にも共有してみてください。

▼お友達のお店も無料で診断できます
https://okyakusa-ma.com/

お客様どっと混む
えらばれる店スコア診断 β`;
    }

    function shortFocus(value) {
      const raw = text(value, "重点未判定");
      if (raw.includes("Googleビジネスプロフィール")) return "Googleビジネスプロフィール整備";
      if (raw.includes("駐車場") || raw.includes("入口") || raw.includes("席")) return "来店前不安の解消";
      const firstSentence = raw.split(/[。.!！?？]/)[0];
      return firstSentence.length > 24 ? `${firstSentence.slice(0, 24)}...` : firstSentence;
    }

    function formatMonth(value) {
      if (!value) return "未判定";
      const date = new Date(value);
      if (!Number.isNaN(date.getTime())) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        return `${year}年${month}月`;
      }
      const match = String(value).match(/^(\d{4})-(\d{2})/);
      return match ? `${match[1]}年${match[2]}月` : String(value);
    }

    function showError(message) {
      loading.hidden = true;
      errorBox.hidden = false;
      errorBox.textContent = message;
    }

    async function main() {
      if (!id) {
        showError("URLに受付IDがありません。 /r/view/?id=req_xxxxx の形式で開いてください。");
        return;
      }

      const response = await fetch(`/api/report?id=${encodeURIComponent(id)}`);
      const data = await response.json();
      if (!response.ok || !data.ok) {
        showError(data.message || "診断結果を読み込めませんでした。");
        return;
      }

      const payload = data.report || {};
      const request = payload.request || {};
      const maps = payload.maps_observation || {};
      const ai = payload.ai_diagnosis || {};
      const monthly = payload.monthly_report || {};
      const aiRaw = payload.raw?.ai_diagnosis?.diagnosis || payload.raw?.ai_diagnosis || {};
      const monthlyRaw = payload.raw?.monthly_report || {};

      const storeName = text(ai.store_name || request.store_name, "診断店舗");
      const totalScore = Number(ai.total_score || monthly.total_score || aiRaw.total_score || 0);
      const summary = ai.summary || aiRaw.summary || "診断下書きを生成しました。Google Maps観測値とAI診断を確認してください。";

      document.querySelector("#store-name").textContent = storeName;
      document.querySelector("#summary").textContent = summary;
      document.querySelector("#total-score").textContent = totalScore || "--";
      document.querySelector("#score-ring").style.setProperty("--value", totalScore || 0);
      document.querySelector("#meta").textContent = `受付ID: ${id} / β診断`;

      document.querySelector("#metrics").innerHTML = [
        metric("Mapsスコア", ai.maps_score || maps.maps_score, mapsMetricNote(maps, ai)),
        metric("口コミ", `${text(maps.rating)} / ${text(maps.user_rating_count, "0")}件`, reviewMetricNote(maps, ai)),
        metric("検索スコア", `SEO ${text(ai.seo_score)} / AI検索 ${text(ai.geo_score)}`, searchMetricNote(request, ai)),
        metric("今月の重点", shortFocus(monthly.this_month_focus || ai.top_fix), focusMetricNote(monthly.this_month_focus || ai.top_fix))
      ].join("");

      document.querySelector("#score-explanations").innerHTML = [
        scoreCard("Mapsスコア", `${text(ai.maps_score || maps.maps_score)}点`, mapsScoreComment(maps, ai), "店舗特定、カテゴリ、営業時間、口コミ、Web導線、電話、写真を確認"),
        scoreCard("口コミ信頼", `${text(ai.review_score)}点`, reviewScoreComment(maps, ai), "評価平均、口コミ件数、信頼形成、来店理由への変換余地を確認"),
        scoreCard("SEO", `${text(ai.seo_score)}点`, seoScoreComment(request, ai), "公式サイト、地域名＋業種、来店前検索語、基本情報の見つけやすさを確認"),
        scoreCard("AI検索/GEO", `${text(ai.geo_score)}点`, geoScoreComment(ai), "AIが店を説明・推薦しやすい特徴、利用シーン、Plan情報を確認")
      ].join("");

      list("#maps-list", [
        `店舗特定: ${text(maps.identity_status)} / ${text(maps.identity_score)}点`,
        `正式名: ${text(maps.matched_store_name || request.store_name)}`,
        `住所: ${text(maps.matched_address)}`,
        `カテゴリ: ${text(maps.maps_category)}`,
        `評価: ${text(maps.rating)} / 口コミ ${text(maps.user_rating_count, "0")}件`,
        `Mapsスコア: ${text(maps.maps_score)}`
      ]);

      list("#weaknesses", parseJson(ai.weaknesses, aiRaw.weaknesses || []));
      list("#strengths", parseJson(ai.strengths, aiRaw.strengths || []));
      document.querySelector("#top-fix").textContent = ai.top_fix || aiRaw.top_fix || monthly.this_month_focus || "Google MapsとSNSの来店前情報を整える";

      const videos = parseJson(ai.video_ideas, aiRaw.video_ideas || monthlyRaw.video_plan || []);
      const videosEl = document.querySelector("#videos");
      videosEl.innerHTML = "";
      videos.slice(0, 3).forEach((video) => {
        const card = document.createElement("div");
        card.className = "video";
        const tag = document.createElement("span");
        tag.className = "tag";
        tag.textContent = text(video.tag, "Video");
        const title = document.createElement("strong");
        title.textContent = text(video.title);
        const reason = document.createElement("p");
        reason.textContent = text(video.reason || video.body, "");
        card.append(tag, title, reason);
        videosEl.appendChild(card);
      });

      list("#monthly", [
        `対象月: ${formatMonth(monthly.month || monthlyRaw.month)}`,
        `今月の重点改善: ${text(monthly.this_month_focus || monthlyRaw.this_month_focus)}`,
        ...parseJson(monthly.action_items, monthlyRaw.action_items || []).slice(0, 5),
        ...parseJson(monthly.next_review_questions, monthlyRaw.next_review_questions || []).slice(0, 3)
      ]);

      const shareText = `お客様どっと混むで「${storeName}」の見え方診断を見ました。\n総合スコア: ${text(totalScore || "")}/100\nMaps: ${text(ai.maps_score || maps.maps_score)} / 口コミ: ${text(maps.rating)} (${text(maps.user_rating_count, "0")}件)\nGoogle Maps・口コミ・SNS・来店前不安が点数で見られます。\n${window.location.href}`;
      const mailSubject = buildMailSubject(storeName);
      const mailBody = buildMailBody(storeName, totalScore, maps, ai, monthly);
      document.querySelector("#line-share").href = `https://line.me/R/msg/text/?${encodeURIComponent(shareText)}`;
      document.querySelector("#mail-share").href = `mailto:?subject=${encodeURIComponent(mailSubject)}&body=${encodeURIComponent(mailBody)}`;
      document.querySelector("#native-share").addEventListener("click", async () => {
        try {
          if (navigator.share) {
            await navigator.share({
              title: `${storeName}様のお店の見え方診断`,
              text: shareText,
              url: window.location.href
            });
            return;
          }
          await navigator.clipboard.writeText(shareText);
          document.querySelector("#native-share").textContent = "コピーしました";
        } catch (error) {
          document.querySelector("#native-share").textContent = "共有を中止しました";
        }
      });
      document.querySelector("#copy-share").addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(shareText);
          document.querySelector("#copy-share").textContent = "コピーしました";
        } catch (error) {
          document.querySelector("#copy-share").textContent = "コピーできませんでした";
        }
      });

      loading.hidden = true;
      reportEl.hidden = false;
    }

    main().catch((error) => showError(error.message));
  </script>
</body>
</html>
