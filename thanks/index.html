<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>無料診断を受け付けました | お客様どっと混む</title>
  <style>
    :root {
      --ink: #17202c;
      --muted: #667085;
      --line: #d7dde6;
      --green: #1f8a70;
      --green-dark: #12614e;
      --paper: #ffffff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--ink);
      background: linear-gradient(180deg, #f9fbfd 0%, #eef3f8 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "YuGothic", "Noto Sans JP", sans-serif;
      line-height: 1.6;
    }

    main {
      width: min(760px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      padding: 34px;
      box-shadow: 0 22px 70px rgba(23, 32, 44, .12);
    }

    .brand {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.18;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 16px;
      color: #344054;
    }

    .receipt {
      display: grid;
      gap: 8px;
      margin: 22px 0;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfe;
    }

    .receipt span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .receipt strong {
      font-size: 20px;
      overflow-wrap: anywhere;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 24px;
    }

    a {
      display: inline-flex;
      min-height: 42px;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      padding: 10px 14px;
      border: 1px solid var(--line);
      color: var(--ink);
      background: #fff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 850;
    }

    a.primary {
      color: #fff;
      border-color: var(--green);
      background: var(--green);
    }
  </style>
</head>
<body>
  <main>
    <div class="brand">お客様どっと混む / えらばれる店スコア診断</div>
    <h1>無料診断を受け付けました。</h1>
    <p>
      店舗特定を確認したうえで、Google Maps、簡易SEO、SNS、来店前不安、Save/Plan/Impulseの観点から診断します。
      結果ページは短いURLで発行し、LINEやメールで共有できる形にします。
    </p>

    <div class="receipt">
      <span>受付ID</span>
      <strong id="request-id">確認中</strong>
    </div>

    <p>
      β版では手動確認を含むため、診断結果の公開まで少し時間をいただきます。
      お急ぎの場合は、この受付IDを添えてご連絡ください。
    </p>

    <div class="actions">
      <a class="primary" href="/">トップへ戻る</a>
      <a href="/r/sample/">診断結果サンプルを見る</a>
    </div>
  </main>

  <script>
    const id = new URLSearchParams(window.location.search).get("id");
    document.querySelector("#request-id").textContent = id || "未取得";
  </script>
</body>
</html>
